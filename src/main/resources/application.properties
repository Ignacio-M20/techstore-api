# ==============================================
# TechStore Chile - Configuración de la aplicación
# ==============================================

# Puerto del servidor
server.port=8080

# ==============================================
# Base de Datos - PostgreSQL
# ==============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/techstore
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================================
# Seguridad JWT - Credenciales de acceso
# (No se almacenan en base de datos)
# ==============================================
app.jwt.secret=TechStoreChile2024SecretKeyMuyLargaParaQueSeaSegura1234567890
app.jwt.expiration=3600000

# Credenciales del usuario administrador (hardcoded, no en BD)
app.auth.username=admin@techstore.cl
app.auth.password=Admin1234

# ==============================================
# Nombre de la aplicación
# ==============================================
spring.application.name=techstore-api

# ==============================================
# Configuración de Amazon SQS
# ==============================================
app.sqs.audit-queue-url=${SQS_QUEUE_URL:https://sqs.us-east-1.amazonaws.com/<TU_ACCOUNT_ID>/techstore-audit-queue}