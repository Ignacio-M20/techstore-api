version: '3.8'

# =============================================
# Docker Compose - TechStore Chile
# Orquesta PostgreSQL + el microservicio API
# =============================================

services:

  # Base de datos PostgreSQL 15
  postgres:
    image: postgres:15
    container_name: techstore_db
    environment:
      POSTGRES_DB: techstore
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d techstore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Microservicio TechStore API
  microservicio:
    build: .
    container_name: techstore_api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/techstore
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
